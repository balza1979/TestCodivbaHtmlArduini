<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Progetti Arduino</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        background: #00979D; /* Azzurro Arduino */
        color: black;
        text-align: center;
    }

    h1 {
        font-size: 80px;
        margin-bottom: 20px;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        margin: 20px auto 50px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }

    select, button {
        width: 90%;
        font-size: 50px;
        padding: 30px;
        margin: 20px auto;
        border-radius: 20px;
        border: 4px solid black;
        display: block;
    }

    .openBtn {
        background: #28a745;
        color: white;
        font-weight: bold;
    }

    .deleteBtn {
        background: #cc0000;
        color: white;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Progetti Arduino</h1>

<button class="homeBtn" onclick="window.location.href='linguaggio.html'">🏠 HOME</button>

<!-- Lista progetti -->
<select id="selectProgetti">
    <option value="">-- Seleziona un progetto --</option>
</select>

<button class="openBtn" onclick="apriProgetto()">📂 Apri Progetto</button>
<button class="deleteBtn" onclick="eliminaProgetto()">🗑️ Elimina Progetto</button>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, child, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB1_lem0tKd5SQeuD7xs8Dj3Ey77MUUhDY",
    authDomain: "programmazione-4d38e.firebaseapp.com",
    databaseURL: "https://programmazione-4d38e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "programmazione-4d38e",
    storageBucket: "programmazione-4d38e.appspot.com",
    messagingSenderId: "390860890072",
    appId: "1:390860890072:web:5199a3f3c80f5b95a5dcad"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* -------------------------------
   CARICA LISTA PROGETTI
--------------------------------*/
function caricaLista() {
    const sel = document.getElementById("selectProgetti");

    get(child(ref(db), "progetti/arduino")).then(snap => {
        sel.innerHTML = "<option value=''>-- Seleziona un progetto --</option>";

        if (!snap.exists()) return;

        Object.entries(snap.val()).forEach(([id, dati]) => {

    let nome = "";

    if (dati.nomeFile && dati.nomeFile.trim() !== "") {
        // 🔥 Se il progetto ha un nome file → usalo come nome progetto
        nome = dati.nomeFile + ".ino";
    } else {
        // Altrimenti usa una data leggibile
        const data = new Date(Number(id));
        nome = `Progetto del ${data.toLocaleDateString()} ${data.toLocaleTimeString()}`;
    }

    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = nome;

    sel.appendChild(opt);
});
    });
}

caricaLista();

/* -------------------------------
   APRI PROGETTO
--------------------------------*/
window.apriProgetto = function() {
    const id = document.getElementById("selectProgetti").value;

    if (!id) {
        alert("Seleziona un progetto");
        return;
    }

    // Salviamo l'ID per la pagina progetto
    localStorage.setItem("progettoArduinoID", id);

    // Apriamo la pagina progetto
    window.location.href = "progetto_arduino.html";
};

/* -------------------------------
   ELIMINA PROGETTO
--------------------------------*/
window.eliminaProgetto = function() {
    const id = document.getElementById("selectProgetti").value;

    if (!id) {
        alert("Seleziona un progetto da eliminare");
        return;
    }

    if (!confirm("Vuoi davvero eliminare questo progetto?")) return;

    remove(ref(db, "progetti/arduino/" + id));

    alert("Progetto eliminato!");
    caricaLista();
};

</script>

</body>
</html>
