<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MENU LINGUAGGIO</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        text-align: center;
        color: black; /* Testo nero */
    }

    h1 {
        font-size: 90px;
        margin-bottom: 40px;
        color: black;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        margin: 20px auto 50px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }

    .btn {
        width: 90%;
        padding: 50px;
        margin: 25px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }
</style>

</head>
<body>

<h1 id="titolo"></h1>

<!-- ✅ IL BOTTONE HOME VA QUI, FUORI DALLO SCRIPT -->
<button class="homeBtn" onclick="window.location.href='index.html'">🏠 HOME</button>

<div id="menu"></div>

<script>
const lang = localStorage.getItem("linguaggio") || "default";

const colori = {
    javascript: "#F7DF1E",
    html: "#E44D26",
    css: "#264DE4",
    vba: "#6A1B9A",
    arduino: "#00979D",
    excel: "#1D6F42"
};

document.body.style.background = colori[lang] || "#DDD";

const titoli = {
    javascript: "JavaScript",
    html: "HTML",
    css: "CSS",
    vba: "VBA",
    arduino: "Arduino",
    excel: "Excel"
};

document.getElementById("titolo").textContent = titoli[lang] || "Linguaggio";

const menu = {
    javascript: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo.html" },
        { t: "Crea nuovo Script", a: "progetto_js.html" },
        { t: "Apri Script esistente", a: "lista_js.html" }
    ],
    html: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo.html" },
        { t: "Crea nuovo Template HTML", a: "progetto_html.html" },
        { t: "Apri Template esistente", a: "lista_html.html" }
    ],
    css: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo.html" },
        { t: "Crea nuovo Foglio di Stile", a: "progetto_css.html" },
        { t: "Apri Foglio di Stile", a: "lista_css.html" }
    ],
    vba: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo.html" },
        { t: "Crea nuova Macro", a: "progetto_vba.html" },
        { t: "Apri Macro esistente", a: "lista_vba.html" }
    ],
    arduino: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo_arduino.html" },
        { t: "Crea nuovo Progetto Arduino", a: "progetto_arduino.html" },
        { t: "Apri Progetto Arduino", a: "lista_arduino.html" }
    ],
    excel: [
        { t: "Aggiungi / Modifica Capitolo", a: "capitolo.html" },
        { t: "Crea nuovo Progetto Excel", a: "progetto_excel.html" },
        { t: "Apri Progetto Excel", a: "lista_excel.html" }
    ]
};

menu[lang].forEach(item => {
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = item.t;
    b.onclick = () => window.location.href = item.a;
    document.getElementById("menu").appendChild(b);
});
</script>

</body>
</html>
