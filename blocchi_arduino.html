<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Blocchi Arduino</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/editor.css">
</head>

<body>

    <h1>Blocchi Arduino</h1>

    <div class="homeContainer">

        <button class="homeBtn" style="background:#2ECC40;" onclick="apriPopupNuovoBlocco()">
            ➕ Crea Nuovo Blocco
        </button>

        <button class="homeBtn" style="background:#0074D9;" onclick="caricaBlocchi()">
            🔄 Ricarica Blocchi
        </button>

        <button class="homeBtn" style="background:#85144b;" onclick="window.location.href='arduino_menu.html'">
            🔙 Torna al Menu Arduino
        </button>

    </div>

    <h2 class="sectionTitle">Filtra per Categoria</h2>

    <div class="chipPanel" id="chipCategorie"></div>

    <h2 class="sectionTitle">Blocchi Disponibili</h2>

    <div id="listaBlocchi" class="chipPanel"></div>

    <!-- POPUP CREAZIONE / MODIFICA BLOCCO -->
    <div id="popupBlocco" class="popupOverlay">
        <div class="popupBox">
            <div class="popupTitle" id="popupTitolo">Nuovo Blocco</div>

            <input id="bloccoNome" placeholder="Nome blocco">
            <input id="bloccoCategoria" placeholder="Categoria">
            <textarea id="bloccoDescrizione" placeholder="Descrizione"></textarea>
            <textarea id="bloccoCodice" placeholder="Codice Arduino"></textarea>

            <button class="popupBtn" id="btnSalvaBlocco">💾 Salva Blocco</button>
            <button class="popupClose" onclick="chiudiPopupBlocco()">Chiudi</button>
        </div>
    </div>

    <script type="module" src="js/blocchi_arduino.js"></script>

</body>
</html>
