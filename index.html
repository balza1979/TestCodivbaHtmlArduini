<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAPITOLO</title>

<style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    h1 {
        text-align: center;
    }

    .box {
        border: 1px solid #ccc;
        padding: 15px;
        margin-top: 15px;
        border-radius: 8px;
        background: #f9f9f9;
    }

    .row {
        margin-bottom: 10px;
    }

    label {
        font-weight: bold;
    }

    input, textarea, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #aaa;
    }

    button {
        padding: 10px 20px;
        margin-top: 15px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    .deleteBtn {
        background: red;
        margin-top: 10px;
    }
</style>

</head>
<body>

<h1 id="titoloCapitolo">CAPITOLO</h1>

<!-- DESCRIZIONE -->
<div class="box">
    <label>DESCRIZIONE GENERALE</label>
    <textarea id="descrizione" rows="4"></textarea>
</div>

<!-- CODICE -->
<div class="box">
    <label>CODICE</label>
    <textarea id="codice" rows="4"></textarea>
</div>

<!-- DETTAGLI -->
<h2>DETTAGLI</h2>
<div id="contenitoreDettagli"></div>

<button onclick="aggiungiDettaglio()">AGGIUNGI DETTAGLIO</button>

<script>
let contatore = 0;

function aggiungiDettaglio() {
    contatore++;

    const div = document.createElement("div");
    div.className = "box";
    div.id = "dettaglio_" + contatore;

    div.innerHTML = `
        <div class="row">
            <label>TIPO</label>
            <select>
                <option value="variabile">Variabile</option>
                <option value="costante">Costante</option>
                <option value="proprieta">Proprietà</option>
                <option value="oggetto">Oggetto</option>
                <option value="funzione">Funzione</option>
                <option value="altro">Altro</option>
            </select>
        </div>

        <div class="row">
            <label>PAROLA CHIAVE</label>
            <input type="text" placeholder="es: xcolor">
        </div>

        <div class="row">
            <label>DESCRIZIONE</label>
            <input type="text" placeholder="es: colore rosso">
        </div>

        <div class="row">
            <label>VALORE / CODICE</label>
            <input type="text" placeholder="es: 000314">
        </div>

        <div class="row">
            <label>APPUNTI 1</label>
            <input type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 2</label>
            <input type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 3</label>
            <input type="text" placeholder="campo libero">
        </div>

        <button class="deleteBtn" onclick="rimuoviDettaglio('${div.id}')">ELIMINA</button>
    `;

    document.getElementById("contenitoreDettagli").appendChild(div);
}

function rimuoviDettaglio(id) {
    document.getElementById(id).remove();
}
</script>

</body>
</html>
