<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SELEZIONA LINGUAGGIO</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        background: #f2f2f2;
        text-align: center;
    }

    h1 {
        font-size: 90px;
        margin-bottom: 60px;
    }

    .btn {
        width: 90%;
        padding: 60px;
        margin: 30px auto;
        font-size: 70px;
        border-radius: 30px;
        border: none;
        background: #007bff;
        color: white;
        font-weight: bold;
        display: block;
    }
</style>

</head>
<body>

<h1>SCEGLI IL LINGUAGGIO</h1>

<button class="btn" onclick="scegli('vb')">Visual Basic</button>
<button class="btn" onclick="scegli('python')">Python</button>
<button class="btn" onclick="scegli('js')">JavaScript</button>
<button class="btn" onclick="scegli('cpp')">C++</button>
<button class="btn" onclick="scegli('html')">HTML / CSS</button>

<script>
function scegli(lang) {
    localStorage.setItem("linguaggio", lang);
    window.location.href = "capitolo.html"; 
}
</script>

</body>
</html>
