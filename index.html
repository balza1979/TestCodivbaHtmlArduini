<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAPITOLO</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 20px;
        font-size: 60px;
        background: #f2f2f2;
        width: 100%;
    }

    h1 {
        text-align: center;
        font-size: 80px;
        margin-bottom: 35px;
    }

    .box {
        border: 4px solid #999;
        padding: 35px;
        margin-top: 35px;
        border-radius: 20px;
        background: white;
        width: 100%;
        box-sizing: border-box;
    }

    .row {
        margin-bottom: 35px;
    }

    label {
        font-weight: bold;
        font-size: 68px;
        display: block;
        margin-bottom: 15px;
    }

    input, textarea, select {
        width: 100%;
        padding: 30px;
        border-radius: 18px;
        border: 4px solid #777;
        font-size: 60px;
        background: #fff;
        box-sizing: border-box;
    }

    textarea {
        height: 300px;
    }

    .header {
        width: 100%;
        background: #333;
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 999;
        text-align: center;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        font-size: 70px;
        border-radius: 25px;
        background: #ff4444;
        color: white;
        border: none;
        font-weight: bold;
    }

    button {
        width: 100%;
        padding: 35px;
        margin-top: 40px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 20px;
        cursor: pointer;
        font-size: 60px;
        font-weight: bold;
    }

    .deleteBtn {
        background: #cc0000;
        margin-top: 40px;
    }
</style>

</head>
<body>

<div class="header">
    <button class="homeBtn" onclick="window.location.href='index.html'">HOME</button>
</div>

<h1 id="titoloCapitolo">CAPITOLO</h1>

<!-- DESCRIZIONE -->
<div class="box">
    <label>DESCRIZIONE GENERALE</label>
    <textarea id="descrizione"></textarea>
</div>

<!-- CODICE -->
<div class="box">
    <label>CODICE</label>
    <textarea id="codice"></textarea>
</div>

<!-- DETTAGLI -->
<h1 style="font-size:55px; margin-top:50px;">DETTAGLI</h1>
<div id="contenitoreDettagli"></div>

<button onclick="aggiungiDettaglio()">AGGIUNGI DETTAGLIO</button>

<!-- SCRIPT FUNZIONI UI -->
<script>
let contatore = 0;

function aggiungiDettaglio() {
    contatore++;

    const div = document.createElement("div");
    div.className = "box";
    div.id = "dettaglio_" + contatore;

    div.innerHTML = `
        <div class="row">
            <label>TIPO</label>
            <select>
                <option value="variabile">Variabile</option>
                <option value="costante">Costante</option>
                <option value="proprieta">Proprietà</option>
                <option value="oggetto">Oggetto</option>
                <option value="funzione">Funzione</option>
                <option value="altro">Altro</option>
            </select>
        </div>

        <div class="row">
            <label>PAROLA CHIAVE</label>
            <input type="text" placeholder="es: xcolor">
        </div>

        <div class="row">
            <label>DESCRIZIONE</label>
            <input type="text" placeholder="es: colore rosso">
        </div>

        <div class="row">
            <label>MODALITÀ VALORE</label>
            <select onchange="cambiaModalita(this, '${div.id}')">
                <option value="tendina">Valori predefiniti (tendina)</option>
                <option value="libero">Valore libero (input)</option>
            </select>
        </div>

        <div class="row valoreTendina">
            <label>VALORE / CODICE (per tendina)</label>
            <input type="text" placeholder="es: 000314">
        </div>

        <div class="row valoreLibero" style="display:none;">
            <label>VALORE LIBERO</label>
            <input type="text" placeholder="es: 10">
        </div>

        <div class="row">
            <label>APPUNTI 1</label>
            <input type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 2</label>
            <input type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 3</label>
            <input type="text" placeholder="campo libero">
        </div>

        <button class="deleteBtn" onclick="rimuoviDettaglio('${div.id}')">ELIMINA</button>
    `;

    document.getElementById("contenitoreDettagli").appendChild(div);
}

function cambiaModalita(select, id) {
    const box = document.getElementById(id);
    const tendina = box.querySelector(".valoreTendina");
    const libero = box.querySelector(".valoreLibero");

    if (select.value === "tendina") {
        tendina.style.display = "block";
        libero.style.display = "none";
    } else {
        tendina.style.display = "none";
        libero.style.display = "block";
    }
}

function rimuoviDettaglio(id) {
    document.getElementById(id).remove();
}
</script>

<!-- PULSANTE SALVA -->
<button onclick="salvaCapitolo()" style="background:#28a745;">SALVA CAPITOLO</button>

<!-- FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1_lem0tKd5SQeuD7xs8Dj3Ey77MUUhDY",
        authDomain: "programmazione-4d38e.firebaseapp.com",
        databaseURL: "https://programmazione-4d38e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "programmazione-4d38e",
        storageBucket: "programmazione-4d38e.appspot.com",
        messagingSenderId: "390860890072",
        appId: "1:390860890072:web:5199a3f3c80f5b95a5dcad",
        measurementId: "G-HGHJEJ6RWT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.salvaCapitolo = function() {
        const descrizione = document.getElementById("descrizione").value;
        const codice = document.getElementById("codice").value;

        const dettagli = [];
        document.querySelectorAll("#contenitoreDettagli .box").forEach(box => {
            const obj = {
                tipo: box.querySelector("select").value,
                parola: box.querySelectorAll("input")[0].value,
                descrizione: box.querySelectorAll("input")[1].value,
                modalita: box.querySelector("select:nth-of-type(2)").value,
                valoreTendina: box.querySelector(".valoreTendina input")?.value || "",
                valoreLibero: box.querySelector(".valoreLibero input")?.value || "",
                appunti1: box.querySelectorAll("input")[2].value,
                appunti2: box.querySelectorAll("input")[3].value,
                appunti3: box.querySelectorAll("input")[4].value
            };
            dettagli.push(obj);
        });

        set(ref(db, "capitoli/" + Date.now()), {
            descrizione,
            codice,
            dettagli
        });

        alert("Capitolo salvato!");
    };
</script>
</body>
</html>
