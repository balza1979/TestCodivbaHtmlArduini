<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAPITOLO</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 20px;
        font-size: 60px;
        background: #f2f2f2;
        width: 100%;
    }

    h1 {
        text-align: center;
        font-size: 80px;
        margin-bottom: 35px;
    }

    .box {
        border: 4px solid #999;
        padding: 35px;
        margin-top: 35px;
        border-radius: 20px;
        background: white;
        width: 100%;
        box-sizing: border-box;
    }

    .row {
        margin-bottom: 35px;
    }

    label {
        font-weight: bold;
        font-size: 68px;
        display: block;
        margin-bottom: 15px;
    }

    input, textarea, select {
        width: 100%;
        padding: 30px;
        border-radius: 18px;
        border: 4px solid #777;
        font-size: 60px;
        background: #fff;
        box-sizing: border-box;
    }

    textarea {
        height: 300px;
    }

    .header {
        width: 100%;
        background: #333;
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 999;
        text-align: center;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        font-size: 70px;
        border-radius: 25px;
        background: #ff4444;
        color: white;
        border: none;
        font-weight: bold;
    }

    button {
        width: 100%;
        padding: 35px;
        margin-top: 40px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 20px;
        cursor: pointer;
        font-size: 60px;
        font-weight: bold;
    }

    .deleteBtn {
        background: #cc0000;
        margin-top: 40px;
    }
</style>

</head>
<body>

<div class="header">
    <button class="homeBtn" onclick="window.location.href='index.html'">HOME</button>
</div>

<h1 id="titoloCapitolo">CAPITOLO</h1>

<!-- 🔍 BARRA DI RICERCA -->
<div class="box">
    <label>CERCA CAPITOLO</label>
    <input id="campoRicerca" type="text" placeholder="Cerca per descrizione, codice, parola" oninput="cercaCapitoli()">

    <label>FILTRA PER TIPO</label>
    <select id="filtroTipo" onchange="cercaCapitoli()">
        <option value="">Tutti</option>
        <option value="variabile">Variabile</option>
        <option value="costante">Costante</option>
        <option value="proprieta">Proprietà</option>
        <option value="oggetto">Oggetto</option>
        <option value="funzione">Funzione</option>
        <option value="altro">Altro</option>
    </select>

    <label>RISULTATI</label>
    <select id="risultatiRicerca" onchange="caricaCapitolo()">
        <option value="">-- Nessun risultato --</option>
    </select>
</div>
  <!-- DESCRIZIONE -->
<div class="box">
    <label>DESCRIZIONE GENERALE</label>
    <textarea id="descrizione"></textarea>
</div>

<!-- CODICE -->
<div class="box">
    <label>CODICE</label>
    <textarea id="codice"></textarea>
</div>

<!-- DETTAGLI -->
<h1 style="font-size:55px; margin-top:50px;">DETTAGLI</h1>
<div id="contenitoreDettagli"></div>

<button onclick="aggiungiDettaglio()">AGGIUNGI DETTAGLIO</button>

<!-- SCRIPT FUNZIONI UI -->
<script>
let contatore = 0;

function aggiungiDettaglio() {
    contatore++;

    const div = document.createElement("div");
    div.className = "box dettaglioBox";
    div.id = "dettaglio_" + contatore;

    div.innerHTML = `
        <div class="row">
            <label>TIPO</label>
            <select class="tipoSelect">
                <option value="variabile">Variabile</option>
                <option value="costante">Costante</option>
                <option value="proprieta">Proprietà</option>
                <option value="oggetto">Oggetto</option>
                <option value="funzione">Funzione</option>
                <option value="altro">Altro</option>
            </select>
        </div>

        <div class="row">
            <label>PAROLA CHIAVE</label>
            <input class="parolaInput" type="text" placeholder="es: xcolor">
        </div>

        <div class="row">
            <label>DESCRIZIONE</label>
            <input class="descrizioneInput" type="text" placeholder="es: colore rosso">
        </div>

        <div class="row">
            <label>MODALITÀ VALORE</label>
            <select class="modalitaSelect" onchange="cambiaModalita(this, '${div.id}')">
                <option value="tendina">Valori predefiniti (tendina)</option>
                <option value="libero">Valore libero (input)</option>
            </select>
        </div>

        <div class="row valoreTendina">
            <label>VALORE / CODICE (per tendina)</label>
            <input class="tendinaInput" type="text" placeholder="es: 000314">
        </div>

        <div class="row valoreLibero" style="display:none;">
            <label>VALORE LIBERO</label>
            <input class="liberoInput" type="text" placeholder="es: 10">
        </div>

        <div class="row">
            <label>APPUNTI 1</label>
            <input class="app1" type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 2</label>
            <input class="app2" type="text" placeholder="campo libero">
        </div>

        <div class="row">
            <label>APPUNTI 3</label>
            <input class="app3" type="text" placeholder="campo libero">
        </div>

        <button class="deleteBtn" onclick="rimuoviDettaglio('${div.id}')">ELIMINA</button>
    `;

    document.getElementById("contenitoreDettagli").appendChild(div);
}

function cambiaModalita(select, id) {
    const box = document.getElementById(id);
    const tendina = box.querySelector(".valoreTendina");
    const libero = box.querySelector(".valoreLibero");

    if (select.value === "tendina") {
        tendina.style.display = "block";
        libero.style.display = "none";
    } else {
        tendina.style.display = "none";
        libero.style.display = "block";
    }
}

function rimuoviDettaglio(id) {
    document.getElementById(id).remove();
}
</script>

<!-- PULSANTE SALVA -->
<button onclick="salvaCapitolo()" style="background:#28a745;">SALVA CAPITOLO</button>
    <button onclick="eliminaCapitolo()" style="background:#cc0000;">ELIMINA CAPITOLO</button>
  <!-- FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = {
        apiKey: "AIzaSyB1_lem0tKd5SQeuD7xs8Dj3Ey77MUUhDY",
        authDomain: "programmazione-4d38e.firebaseapp.com",
        databaseURL: "https://programmazione-4d38e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "programmazione-4d38e",
        storageBucket: "programmazione-4d38e.appspot.com",
        messagingSenderId: "390860890072",
        appId: "1:390860890072:web:5199a3f3c80f5b95a5dcad",
        measurementId: "G-HGHJEJ6RWT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let capitoloCorrente = null;

    /* 🔍 CERCA CAPITOLI */
    window.cercaCapitoli = function() {
        const testo = document.getElementById("campoRicerca").value.toLowerCase();
        const tipoFiltro = document.getElementById("filtroTipo").value;

        const risultati = document.getElementById("risultatiRicerca");
        risultati.innerHTML = "<option value=''>-- Seleziona --</option>";

        get(child(ref(db), "capitoli")).then(snapshot => {
            if (!snapshot.exists()) return;

            const dati = snapshot.val();

            Object.keys(dati).forEach(id => {
                const cap = dati[id];

                const matchTesto =
                    cap.descrizione?.toLowerCase().includes(testo) ||
                    cap.codice?.toLowerCase().includes(testo) ||
                    cap.dettagli?.some(d => d.parola?.toLowerCase().includes(testo));

                const matchTipo =
                    !tipoFiltro ||
                    cap.dettagli?.some(d => d.tipo === tipoFiltro);

                if (matchTesto && matchTipo) {
                    const opt = document.createElement("option");
                    opt.value = id;
                    opt.textContent = `${cap.descrizione} (${id})`;
                    risultati.appendChild(opt);
                }
            });
        });
    };

    /* 📥 CARICA CAPITOLO */
    window.caricaCapitolo = function() {
        const id = document.getElementById("risultatiRicerca").value;
        if (!id) return;

        capitoloCorrente = id;

        get(child(ref(db), "capitoli/" + id)).then(snapshot => {
            if (!snapshot.exists()) return;

            const cap = snapshot.val();

            document.getElementById("descrizione").value = cap.descrizione || "";
            document.getElementById("codice").value = cap.codice || "";

            document.getElementById("contenitoreDettagli").innerHTML = "";

            cap.dettagli?.forEach(d => {
                aggiungiDettaglio();
                const box = document.querySelector("#contenitoreDettagli .dettaglioBox:last-child");

                box.querySelector(".tipoSelect").value = d.tipo;
                box.querySelector(".parolaInput").value = d.parola;
                box.querySelector(".descrizioneInput").value = d.descrizione;
                box.querySelector(".modalitaSelect").value = d.modalita;

                if (d.modalita === "tendina") {
                    box.querySelector(".valoreTendina").style.display = "block";
                    box.querySelector(".valoreLibero").style.display = "none";
                    box.querySelector(".tendinaInput").value = d.valoreTendina;
                } else {
                    box.querySelector(".valoreTendina").style.display = "none";
                    box.querySelector(".valoreLibero").style.display = "block";
                    box.querySelector(".liberoInput").value = d.valoreLibero;
                }

                box.querySelector(".app1").value = d.appunti1;
                box.querySelector(".app2").value = d.appunti2;
                box.querySelector(".app3").value = d.appunti3;
            });
        });
    };

    /* 💾 SALVA O AGGIORNA */
    window.salvaCapitolo = function() {
        const descrizione = document.getElementById("descrizione").value;
        const codice = document.getElementById("codice").value;

        const dettagli = [];
        document.querySelectorAll(".dettaglioBox").forEach(box => {
            dettagli.push({
                tipo: box.querySelector(".tipoSelect")?.value || "",
                parola: box.querySelector(".parolaInput")?.value || "",
                descrizione: box.querySelector(".descrizioneInput")?.value || "",
                modalita: box.querySelector(".modalitaSelect")?.value || "",
                valoreTendina: box.querySelector(".tendinaInput")?.value || "",
                valoreLibero: box.querySelector(".liberoInput")?.value || "",
                appunti1: box.querySelector(".app1")?.value || "",
                appunti2: box.querySelector(".app2")?.value || "",
                appunti3: box.querySelector(".app3")?.value || ""
            });
        });
window.eliminaCapitolo = function() {
    if (!capitoloCorrente) {
        alert("Nessun capitolo selezionato da eliminare");
        return;
    }

    if (!confirm("Sei sicuro di voler eliminare questo capitolo?")) {
        return;
    }

    remove(ref(db, "capitoli/" + capitoloCorrente))
        .then(() => {
            alert("Capitolo eliminato!");

            // Reset editor
            capitoloCorrente = null;
            document.getElementById("descrizione").value = "";
            document.getElementById("codice").value = "";
            document.getElementById("contenitoreDettagli").innerHTML = "";

            // Reset ricerca
            document.getElementById("risultatiRicerca").value = "";
        });
};
        const id = capitoloCorrente || Date.now();

        set(ref(db, "capitoli/" + id), {
            descrizione,
            codice,
            dettagli
        });

        capitoloCorrente = id;

        alert("Capitolo salvato!");
    };
</script>

</body>
</html>
