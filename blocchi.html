<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocchi Disponibili</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="pageContainer">

        <h1>Blocchi Disponibili</h1>

        <!-- Barra strumenti -->
        <div class="toolbar">

            <input id="searchInput" class="inputBig" type="text" placeholder="Cerca blocco...">

            <select id="filtroCategoria" class="inputBig">
                <option value="tutte">Tutte le categorie</option>
                <option value="input">Input</option>
                <option value="output">Output</option>
                <option value="logica">Logica</option>
                <option value="sensori">Sensori</option>
                <option value="animazione">Animazione</option>
                <option value="esp32">ESP32</option>
                <option value="altro">Altro</option>
            </select>

            <button id="btnNuovoBlocco" class="btnAdd">➕ Nuovo Blocco</button>
        </div>

        <!-- Lista blocchi -->
        <div id="listaBlocchi" class="listaBlocchi"></div>

    </div>

    <!-- Firebase + blocchi.js (MODULI ES6) -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/blocchi.js"></script>

</body>
</html>
