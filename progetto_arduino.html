<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Progetto Arduino</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        background: #00979D; /* Azzurro Arduino */
        color: black;
        text-align: center;
    }

    h1 {
        font-size: 80px;
        margin-bottom: 20px;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        margin: 20px auto 50px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }

    select, textarea, button, input {
        width: 90%;
        font-size: 50px;
        padding: 30px;
        margin: 20px auto;
        border-radius: 20px;
        border: 4px solid black;
        display: block;
        box-sizing: border-box;
    }

    textarea {
        height: 350px;
        background: white;
        color: black;
    }

    .addBtn {
        background: white;
        color: black;
        font-weight: bold;
    }

    .saveBtn {
        background: #28a745;
        color: white;
        font-weight: bold;
    }

    .generateBtn {
        background: #000;
        color: white;
        font-weight: bold;
    }

    /* ----------------------------- */
    /* CHIP FULL-WIDTH COLORATI      */
    /* ----------------------------- */
    .chipContainer {
        width: 90%;
        margin: 0 auto 30px auto;
    }

    .chip {
        width: 100%;
        padding: 35px;
        border-radius: 30px;
        margin-bottom: 25px;
        color: white;
        text-align: left;
        box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .chip:hover {
        transform: scale(1.02);
    }

    .chip.active {
        outline: 6px solid white;
    }

    .chipTitle {
        font-size: 55px;
        font-weight: bold;
    }

    .chipDesc {
        font-size: 40px;
        opacity: 0.85;
    }

    /* Nascondo le select finché non si clicca un chip */
    .selectBlocchi {
        display: none;
    }

    /* POPUP PIN */
    #popupPin {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
    }

    #popupBox {
        background: white;
        padding: 40px;
        border-radius: 30px;
        width: 80%;
        text-align: center;
        border: 6px solid black;
    }

    #popupBox select {
        font-size: 55px;
        padding: 25px;
        border-radius: 20px;
        border: 4px solid black;
        width: 100%;
    }

    #popupBox button {
        font-size: 55px;
        padding: 25px;
        margin-top: 20px;
        border-radius: 20px;
        width: 100%;
        font-weight: bold;
    }

    #popupOk { background: #28a745; color: white; }
    #popupCancel { background: #cc0000; color: white; }
</style>
</head>

<body>

<h1>Progetto Arduino</h1>

<button class="homeBtn" onclick="nuovoProgetto()">🆕 Nuovo Progetto</button>
<button class="homeBtn" onclick="window.location.href='linguaggio.html'">🏠 HOME</button>

<!-- MODELLO -->
<select id="selectModello">
    <option value="">-- Seleziona modello Arduino --</option>
    <option value="uno">Arduino UNO</option>
    <option value="nano">Arduino Nano</option>
    <option value="mega">Arduino Mega</option>
</select>

<!-- DICHIARAZIONI -->
<div class="sectionTitle">Dichiarazioni Globali</div>

<div class="chipContainer" id="chipsDich"></div>

<select id="selectDich" class="selectBlocchi"></select>
<button class="addBtn" onclick="aggiungiBlocco('dich')">➕ Aggiungi a Dichiarazioni</button>
<textarea id="editorDich" placeholder="// Variabili, costanti, librerie..."></textarea>

<!-- SETUP -->
<div class="sectionTitle">Setup()</div>

<div class="chipContainer" id="chipsSetup"></div>

<select id="selectSetup" class="selectBlocchi"></select>
<button class="addBtn" onclick="aggiungiBlocco('setup')">➕ Aggiungi a setup()</button>
<textarea id="editorSetup" placeholder="// Codice di inizializzazione..."></textarea>

<!-- LOOP -->
<div class="sectionTitle">Loop()</div>

<div class="chipContainer" id="chipsLoop"></div>

<select id="selectLoop" class="selectBlocchi"></select>
<button class="addBtn" onclick="aggiungiBlocco('loop')">➕ Aggiungi a loop()</button>
<textarea id="editorLoop" placeholder="// Codice ripetuto continuamente..."></textarea>
