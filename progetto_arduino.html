<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Progetto Arduino 2.0</title>
<style>
/* CSS arriverà nel BLOCCO 2 */
</style>
</head>

<body>

<h1>Progetto Arduino 2.0</h1>

<!-- Pulsanti principali -->
<button class="homeBtn" onclick="nuovoProgetto()">🆕 Nuovo Progetto</button>
<button class="homeBtn" onclick="window.location.href='linguaggio.html'">🏠 HOME</button>

<!-- Selezione modello Arduino -->
<select id="selectModello">
    <option value="">-- Seleziona modello Arduino --</option>
    <option value="uno">Arduino UNO</option>
    <option value="nano">Arduino Nano</option>
    <option value="mega">Arduino Mega</option>
</select>

<!-- Popup informativo -->
<div id="popupInfo"><div id="popupInfoText">...</div></div>

<!-- CONTENUTO NASCOSTO FINO A SCELTA MODELLO -->
<div id="contenuto" style="display:none;">

    <!-- DICHIARAZIONI -->
    <div class="sectionTitle">Dichiarazioni Globali</div>
    <button class="filterBtn disabled" id="btnDich" onclick="apriFiltro('dich')">Filtra</button>
    <div class="chipPanel" id="panelDich"></div>
    <select id="selectDich"></select>
    <textarea id="editorDich"></textarea>

    <!-- SETUP -->
    <div class="sectionTitle">Setup()</div>
    <button class="filterBtn disabled" id="btnSetup" onclick="apriFiltro('setup')">Filtra</button>
    <div class="chipPanel" id="panelSetup"></div>
    <select id="selectSetup"></select>
    <textarea id="editorSetup"></textarea>

    <!-- LOOP -->
    <div class="sectionTitle">Loop()</div>
    <button class="filterBtn disabled" id="btnLoop" onclick="apriFiltro('loop')">Filtra</button>
    <div class="chipPanel" id="panelLoop"></div>
    <select id="selectLoop"></select>
    <textarea id="editorLoop"></textarea>

    <!-- FUNZIONI -->
    <div class="sectionTitle">Funzioni Extra</div>
    <button class="filterBtn disabled" id="btnFunc" onclick="apriFiltro('func')">Filtra</button>
    <div class="chipPanel" id="panelFunc"></div>
    <select id="selectFunc"></select>
    <textarea id="editorFunc"></textarea>

</div>

<!-- Popup PIN -->
<div id="popupPin">
    <div id="popupBox">
        <div id="popupTitle">Seleziona PIN</div>
        <select id="popupSelectPin"></select>
        <button id="popupOk">OK</button>
        <button id="popupCancel">Annulla</button>
    </div>
</div>

<script type="module">
/* JS arriverà nei BLOCCO 3, 4 e 5 */
</script>

</body>
</html>
