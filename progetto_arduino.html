<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Progetto Arduino</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        background: #00979D;
        color: black;
        text-align: center;
    }

    h1 {
        font-size: 80px;
        margin-bottom: 20px;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        margin: 20px auto 50px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }

    select, textarea, button, input {
        width: 90%;
        font-size: 50px;
        padding: 30px;
        margin: 20px auto;
        border-radius: 20px;
        border: 4px solid black;
        display: block;
        box-sizing: border-box;
    }

    textarea {
        height: 350px;
        background: white;
        color: black;
    }

    .addBtn {
        background: white;
        color: black;
        font-weight: bold;
    }

    .saveBtn {
        background: #28a745;
        color: white;
        font-weight: bold;
    }

    .generateBtn {
        background: #000;
        color: white;
        font-weight: bold;
    }

    /* FILTRA disattivato */
    .filterBtn.disabled {
        opacity: 0.5;
        pointer-events: none;
    }

    /* FILTRA feedback click */
    .filterBtn.activeClick {
        background: #FFD700 !important;
        color: black !important;
    }

    /* CHIP PANEL */
    .chipPanel {
        display: none;
        width: 90%;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 25px;
        border: 4px solid black;
        position: relative;
        z-index: 9999;
    }

    .chip {
        width: 100%;
        padding: 35px;
        border-radius: 30px;
        margin-bottom: 25px;
        color: white;
        text-align: left;
        box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        cursor: pointer;
        transition: transform 0.15s ease;
    }

    .chip:hover {
        transform: scale(1.02);
    }

    .chip.active {
        outline: 6px solid white;
    }

    .chipTitle {
        font-size: 55px;
        font-weight: bold;
    }

    .chipDesc {
        font-size: 40px;
        opacity: 0.85;
    }

    .selectBlocchi {
        display: none;
    }

    .applyFilterBtn {
        width: 100%;
        padding: 25px;
        font-size: 45px;
        border-radius: 20px;
        border: 4px solid black;
        background: #28a745;
        color: white;
        font-weight: bold;
        margin-top: 20px;
    }

    /* POPUP INFO (nero semi-trasparente) */
    #popupInfo {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999999;
    }

    #popupInfoText {
        background: black;
        color: white;
        padding: 40px;
        border-radius: 30px;
        width: 80%;
        text-align: center;
        border: 6px solid white;
        font-size: 55px;
        font-weight: bold;
    }

    /* POPUP PIN */
    #popupPin {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 99999;
    }

    #popupBox {
        background: white;
        padding: 40px;
        border-radius: 30px;
        width: 80%;
        text-align: center;
        border: 6px solid black;
    }

    #popupBox select {
        font-size: 55px;
        padding: 25px;
        border-radius: 20px;
        border: 4px solid black;
        width: 100%;
    }

    #popupBox button {
        font-size: 55px;
        padding: 25px;
        margin-top: 20px;
        border-radius: 20px;
        width: 100%;
        font-weight: bold;
    }

    #popupOk { background: #28a745; color: white; }
    #popupCancel { background: #cc0000; color: white; }
</style>
</head>

<body>

<h1>Progetto Arduino 2.0</h1>

<button class="homeBtn" onclick="nuovoProgetto()">🆕 Nuovo Progetto</button>
<button class="homeBtn" onclick="window.location.href='linguaggio.html'">🏠 HOME</button>

<select id="selectModello">
    <option value="">-- Seleziona modello Arduino --</option>
    <option value="uno">Arduino UNO</option>
    <option value="nano">Arduino Nano</option>
    <option value="mega">Arduino Mega</option>
</select>

<!-- POPUP INFO -->
<div id="popupInfo">
    <div id="popupInfoText">...</div>
</div>

<!-- DICHIARAZIONI -->
<div class="sectionTitle">Dichiarazioni Globali</div>
<button class="filterBtn disabled" id="btnDich" onclick="apriFiltro('dich')">Filtra</button>
<div class="chipPanel" id="panelDich"></div>
<select id="selectDich" class="selectBlocchi"></select>
<textarea id="editorDich"></textarea>

<!-- SETUP -->
<div class="sectionTitle">Setup()</div>
<button class="filterBtn disabled" id="btnSetup" onclick="apriFiltro('setup')">Filtra</button>
<div class="chipPanel" id="panelSetup"></div>
<select id="selectSetup" class="selectBlocchi"></select>
<textarea id="editorSetup"></textarea>

<!-- LOOP -->
<div class="sectionTitle">Loop()</div>
<button class="filterBtn disabled" id="btnLoop" onclick="apriFiltro('loop')">Filtra</button>
<div class="chipPanel" id="panelLoop"></div>
<select id="selectLoop" class="selectBlocchi"></select>
<textarea id="editorLoop"></textarea>

<!-- FUNZIONI -->
<div class="sectionTitle">Funzioni Extra</div>
<button class="filterBtn disabled" id="btnFunc" onclick="apriFiltro('func')">Filtra</button>
<div class="chipPanel" id="panelFunc"></div>
<select id="selectFunc" class="selectBlocchi"></select>
<textarea id="editorFunc"></textarea>

<input id="nomeFile" placeholder="Nome file (senza .ino)">

<button class="saveBtn" onclick="salvaProgetto()">💾 Salva Progetto</button>
<button class="generateBtn" onclick="generaFile()">⚙️ Genera File .ino</button>

<!-- POPUP PIN -->
<div id="popupPin">
    <div id="popupBox">
        <div id="popupTitle" style="font-size:65px; font-weight:bold; margin-bottom:20px;">Seleziona PIN</div>
        <select id="popupSelectPin"></select>
        <button id="popupOk">OK</button>
        <button id="popupCancel">Annulla</button>
    </div>
</div>

<!-- FINE PARTE 1 -->
    <script type="module">

/* ============================================================
   IMPORT FIREBASE
============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB1_lem0tKd5SQeuD7xs8Dj3Ey77MUUhDY",
    authDomain: "programmazione-4d38e.firebaseapp.com",
    databaseURL: "https://programmazione-4d38e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "programmazione-4d38e",
    storageBucket: "programmazione-4d38e.appspot.com",
    messagingSenderId: "390860890072",
    appId: "1:390860890072:web:5199a3f3c80f5b95a5dcad"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ============================================================
   POPUP INFO
============================================================ */
function showInfo(msg) {
    document.getElementById("popupInfoText").textContent = msg;
    document.getElementById("popupInfo").style.display = "flex";
}

function hideInfo() {
    document.getElementById("popupInfo").style.display = "none";
}

/* ============================================================
   ABILITA / DISABILITA FILTRA
============================================================ */
function setFiltriEnabled(enabled) {
    const ids = ["btnDich","btnSetup","btnLoop","btnFunc"];
    ids.forEach(id => {
        const btn = document.getElementById(id);
        if (enabled) {
            btn.classList.remove("disabled");
        } else {
            btn.classList.add("disabled");
        }
    });
}

/* ============================================================
   CARICA CAPITOLI (ASYNC + POPUP)
============================================================ */
async function caricaCapitoli() {
    setFiltriEnabled(false);
    showInfo("Caricamento dati...");

    try {
        const dbRef = ref(db);
        const snap = await get(child(dbRef, "capitoli/arduino"));

        window._blocchiArduino = snap.exists() ? snap.val() : {};

        hideInfo();
        setFiltriEnabled(true);

    } catch (e) {
        showInfo("Errore caricamento dati");
        console.error(e);
    }
}

/* ============================================================
   LISTENER ROBUSTO PER ANDROID (Dodge V30 / Huawei T5)
============================================================ */
let ultimoModello = "";

function modelloSelezionato() {
    const modello = document.getElementById("selectModello").value;

    if (modello && modello !== ultimoModello) {
        ultimoModello = modello;
        caricaCapitoli();
    }
}

const sel = document.getElementById("selectModello");

["change", "input", "click", "touchstart", "focusout"].forEach(ev => {
    sel.addEventListener(ev, modelloSelezionato);
});

/* ============================================================
   FILTRI
============================================================ */
function apriFiltro(sezione) {

    const btn = document.getElementById("btn" + capitalize(sezione));

    if (btn.classList.contains("disabled")) {
        showInfo("Dati non pronti");
        setTimeout(hideInfo, 1500);
        return;
    }

    /* feedback click */
    btn.classList.add("activeClick");
    setTimeout(() => btn.classList.remove("activeClick"), 300);

    const panel = document.getElementById("panel" + capitalize(sezione));
    panel.innerHTML = "";

    let tipi = [];
    if (sezione === "dich") tipi = ["variabile","costante","array","stringa","booleano","libreria","configurazione","altro"];
    if (sezione === "setup") tipi = ["in","out","pwm","analog_in","analog_out","tempo","timer","seriale","inizializzazione","altro"];
    if (sezione === "loop") tipi = ["sensore","attuatore","controllo","tempo","debug","logica","altro"];
    if (sezione === "func") tipi = ["funzione","utilita","sensore","attuatore","controllo","altro"];

    tipi.forEach(tipo => {
        const info = CHIP_TIPI[tipo];
        const div = document.createElement("div");
        div.className = "chip";
        div.dataset.tipo = tipo;
        div.style.background = info.colore;
        div.innerHTML = `
            <div class="chipTitle">${info.nome}</div>
            <div class="chipDesc">${info.desc}</div>
        `;
        div.onclick = () => div.classList.toggle("active");
        panel.appendChild(div);
    });

    const btnApply = document.createElement("button");
    btnApply.className = "applyFilterBtn";
    btnApply.textContent = "Applica filtro";
    btnApply.onclick = () => applicaFiltro(sezione);
    panel.appendChild(btnApply);

    panel.style.display = "block";
    document.getElementById("select" + capitalize(sezione)).style.display = "none";
}

function applicaFiltro(sezione) {
    const panel = document.getElementById("panel" + capitalize(sezione));
    const select = document.getElementById("select" + capitalize(sezione));

    const attivi = [...panel.querySelectorAll(".chip.active")].map(c => c.dataset.tipo);

    select.innerHTML = "";

    let trovati = 0;

    Object.values(window._blocchiArduino).forEach(b => {
        if (attivi.includes(b.tipo)) {
            trovati++;
            const opt = document.createElement("option");
            opt.value = JSON.stringify(b);
            opt.textContent = b.nome;
            select.appendChild(opt);
        }
    });

    if (trovati === 0) {
        showInfo("Nessun blocco trovato");
        setTimeout(hideInfo, 1500);
        return;
    }

    panel.style.display = "none";
    select.style.display = "block";
}

/* ============================================================
   UTILITY
============================================================ */
function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
}

/* ============================================================
   TUTTO IL RESTO DEL TUO CODICE (PIN, POPUP PIN, AGGIUNGI BLOCCHI,
   SALVA, GENERA FILE, CARICA PROGETTO) RIMANE IDENTICO
============================================================ */
// Rendi globali le funzioni chiamate da HTML
window.apriFiltro = apriFiltro;
window.applicaFiltro = applicaFiltro;
window.aggiungiBlocco = aggiungiBlocco;
window.nuovoProgetto = nuovoProgetto;
window.salvaProgetto = salvaProgetto;
window.generaFile = generaFile;
</script>
</body>
</html>
