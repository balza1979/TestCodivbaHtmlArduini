<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Progetto HTML</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        padding: 40px;
        background: #E44D26; /* Rosso HTML */
        color: black;
        text-align: center;
    }

    h1 {
        font-size: 80px;
        margin-bottom: 20px;
    }

    .homeBtn {
        width: 90%;
        padding: 40px;
        margin: 20px auto 50px auto;
        font-size: 60px;
        border-radius: 30px;
        border: 5px solid black;
        background: white;
        color: black;
        font-weight: bold;
        display: block;
    }

    .sectionTitle {
        font-size: 60px;
        margin-top: 40px;
        margin-bottom: 20px;
    }

    select, textarea, button {
        width: 90%;
        font-size: 50px;
        padding: 30px;
        margin: 20px auto;
        border-radius: 20px;
        border: 4px solid black;
        display: block;
    }

    textarea {
        height: 400px;
        background: white;
        color: black;
    }

    .addBtn {
        background: white;
        color: black;
        font-weight: bold;
    }

    .saveBtn {
        background: #28a745;
        color: white;
        font-weight: bold;
    }

    .generateBtn {
        background: #000;
        color: white;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Progetto HTML</h1>

<button class="homeBtn" onclick="window.location.href='linguaggio.html'">🏠 HOME</button>

<!-- HTML -->
<div class="sectionTitle">Blocchi HTML</div>
<select id="selectHTML"></select>
<button class="addBtn" onclick="aggiungiBlocco('html')">➕ Aggiungi Blocco HTML</button>
<textarea id="editorHTML" placeholder="Codice HTML finale..."></textarea>

<!-- CSS -->
<div class="sectionTitle">Blocchi CSS</div>
<select id="selectCSS"></select>
<button class="addBtn" onclick="aggiungiBlocco('css')">➕ Aggiungi Blocco CSS</button>
<textarea id="editorCSS" placeholder="Codice CSS finale..."></textarea>

<!-- JS -->
<div class="sectionTitle">Blocchi JavaScript</div>
<select id="selectJS"></select>
<button class="addBtn" onclick="aggiungiBlocco('js')">➕ Aggiungi Blocco JS</button>
<textarea id="editorJS" placeholder="Codice JavaScript finale..."></textarea>

<!-- Pulsanti finali -->
<button class="saveBtn" onclick="salvaProgetto()">💾 Salva Progetto</button>
<button class="generateBtn" onclick="generaFile()">⚙️ Genera File Finale</button>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB1_lem0tKd5SQeuD7xs8Dj3Ey77MUUhDY",
    authDomain: "programmazione-4d38e.firebaseapp.com",
    databaseURL: "https://programmazione-4d38e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "programmazione-4d38e",
    storageBucket: "programmazione-4d38e.appspot.com",
    messagingSenderId: "390860890072",
    appId: "1:390860890072:web:5199a3f3c80f5b95a5dcad"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Carica capitoli HTML/CSS/JS nelle tendine
function caricaCapitoli() {
    const dbRef = ref(db);

    // HTML
    get(child(dbRef, "capitoli/html")).then(snap => {
        const sel = document.getElementById("selectHTML");
        sel.innerHTML = "<option value=''>-- Seleziona blocco HTML --</option>";
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, cap]) => {
                const opt = document.createElement("option");
                opt.value = cap.codice || "";
                opt.textContent = cap.descrizione;
                sel.appendChild(opt);
            });
        }
    });

    // CSS
    get(child(dbRef, "capitoli/css")).then(snap => {
        const sel = document.getElementById("selectCSS");
        sel.innerHTML = "<option value=''>-- Seleziona blocco CSS --</option>";
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, cap]) => {
                const opt = document.createElement("option");
                opt.value = cap.codice || "";
                opt.textContent = cap.descrizione;
                sel.appendChild(opt);
            });
        }
    });

    // JS
    get(child(dbRef, "capitoli/javascript")).then(snap => {
        const sel = document.getElementById("selectJS");
        sel.innerHTML = "<option value=''>-- Seleziona blocco JS --</option>";
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, cap]) => {
                const opt = document.createElement("option");
                opt.value = cap.codice || "";
                opt.textContent = cap.descrizione;
                sel.appendChild(opt);
            });
        }
    });
}

caricaCapitoli();

// Aggiunge blocchi agli editor
window.aggiungiBlocco = function(tipo) {
    if (tipo === "html") {
        const val = document.getElementById("selectHTML").value;
        if (val) document.getElementById("editorHTML").value += "\n\n" + val;
    }
    if (tipo === "css") {
        const val = document.getElementById("selectCSS").value;
        if (val) document.getElementById("editorCSS").value += "\n\n" + val;
    }
    if (tipo === "js") {
        const val = document.getElementById("selectJS").value;
        if (val) document.getElementById("editorJS").value += "\n\n" + val;
    }
};

// Salva progetto
window.salvaProgetto = function() {
    const html = document.getElementById("editorHTML").value;
    const css = document.getElementById("editorCSS").value;
    const js = document.getElementById("editorJS").value;

    const id = Date.now();

    set(ref(db, "progetti/html/" + id), {
        html, css, js
    });

    alert("Progetto salvato!");
};

// Genera file finale
window.generaFile = function() {
    const html = document.getElementById("editorHTML").value;
    const css = document.getElementById("editorCSS").value;
    const js = document.getElementById("editorJS").value;

    const finale = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Progetto HTML</title>
<style>
${css}
</style>
</head>
<body>
${html}
<script>
${js}
</script>
</body>
</html>
`;

    alert("File generato! Lo trovi nella console.");
    console.log(finale);
};

</script>

</body>
</html>
